<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kalkulator IMEI</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

<style>
:root{
  --bg:#f5f5f7;
  --card:#ffffff;
  --text:#1d1d1f;
  --sub:#6e6e73;
  --accent:#0071e3;
  --border:#e5e5e7;
}

*{box-sizing:border-box}

body{
  margin:0;
  font-family:'Inter',sans-serif;
  background:var(--bg);
  color:var(--text);
}

.container{
  max-width:520px;
  margin:auto;
  padding:40px 20px;
}

h1{
  font-size:28px;
  font-weight:700;
  letter-spacing:-0.5px;
  margin-bottom:6px;
}

.sub{
  font-size:14px;
  color:var(--sub);
  margin-bottom:30px;
}

.card{
  background:var(--card);
  border-radius:20px;
  padding:22px;
  border:1px solid var(--border);
}

.group{
  margin-bottom:16px;
}

label{
  font-size:12px;
  font-weight:600;
  color:var(--sub);
}

input,select{
  width:100%;
  margin-top:6px;
  padding:12px;
  border-radius:10px;
  border:1px solid var(--border);
  font-size:15px;
  font-weight:500;
}

input:focus,select:focus{
  outline:none;
  border-color:var(--accent);
}

button{
  width:100%;
  margin-top:18px;
  padding:14px;
  border:none;
  border-radius:12px;
  background:var(--accent);
  color:#fff;
  font-weight:600;
  font-size:15px;
  cursor:pointer;
}

.result{
  margin-top:24px;
  padding:20px;
  border-radius:16px;
  background:#fafafa;
  border:1px solid var(--border);
}

.row{
  display:flex;
  justify-content:space-between;
  margin:8px 0;
  font-size:14px;
}

.total{
  font-size:18px;
  font-weight:700;
  margin-top:10px;
}

.free{
  color:#0a7a3d;
  font-weight:600;
}

.note{
  margin-top:16px;
  font-size:12px;
  color:var(--sub);
  line-height:1.6;
}
</style>
</head>

<body>

<div class="container">

<h1>Kalkulator IMEI</h1>
<div class="sub">Estimasi BM + PPN (tanpa PPh)</div>

<div class="card">

<div class="group">
<label>Jenis Penumpang</label>
<select id="jenis">
<option value="500">Penumpang (USD 500)</option>
<option value="50">Awak (USD 50)</option>
</select>
</div>

<div class="group">
<label>Harga Barang (USD)</label>
<input type="number" id="harga">
</div>

<div class="group">
<label>Jumlah Unit</label>
<input type="number" id="unit" value="1" max="2">
</div>

<div class="group">
<label>Kurs (Rp)</label>
<input type="number" id="kurs" value="17000">
</div>

<div class="group">
<label>Lokasi Registrasi</label>
<select id="lokasi">
<option value="bandara">Bandara</option>
<option value="luar">Luar Bandara</option>
</select>
</div>

<button onclick="hitung()">Hitung</button>

<div class="result" id="result" style="display:none"></div>

</div>
</div>

<script>
function idr(n){
  return "Rp " + Math.round(n).toLocaleString('id-ID');
}
function usd(n){
  return "USD " + n.toFixed(2);
}

function hitung(){
  const harga = parseFloat(document.getElementById('harga').value);
  const unit  = Math.min(parseInt(document.getElementById('unit').value)||1,2);
  const kurs  = parseFloat(document.getElementById('kurs').value);
  const bebas = parseFloat(document.getElementById('jenis').value);
  const luar  = document.getElementById('lokasi').value === 'luar';

  if(!harga){
    alert("Isi harga dulu");
    return;
  }

  const totalUSD = harga * unit;
  const bebasFinal = luar ? 0 : bebas;
  const kena = Math.max(0, totalUSD - bebasFinal);

  const NP  = kena * kurs;
  const BM  = kena > 0 ? Math.ceil(NP * 0.10 / 1000) * 1000 : 0;
  const NI  = NP + BM;
  const PPN = kena > 0 ? (12/100)*(11/12)*NI : 0;

  const total = BM + PPN;

  let html = "";

  html += `<div class="row"><span>Nilai Barang</span><span>${usd(totalUSD)}</span></div>`;
  html += `<div class="row"><span>Pembebasan</span><span>- ${usd(bebasFinal)}</span></div>`;
  html += `<div class="row"><span>Kena Pajak</span><span>${usd(kena)}</span></div>`;

  if(kena > 0){
    html += `<hr>`;
    html += `<div class="row"><span>Bea Masuk</span><span>${idr(BM)}</span></div>`;
    html += `<div class="row"><span>PPN</span><span>${idr(PPN)}</span></div>`;
    html += `<div class="row total"><span>Total</span><span>${idr(total)}</span></div>`;
  } else {
    html += `<div class="row total free"><span>Total</span><span>Rp 0</span></div>`;
  }

  html += `<div class="note">
  Perhitungan hanya BM + PPN<br>
  Tidak termasuk PPh<br>
  Ini hanya estimasi
  </div>`;

  const res = document.getElementById('result');
  res.innerHTML = html;
  res.style.display = 'block';
}
</script>

</body>
</html>
